@switch (type()) {
  @case ('p') {
    <p class="text paragraph">{{ value() }}</p>
  }
  @case ('h1') {
    <h1 class="text header header__1">{{ value() }}</h1>
  }
  @case ('h2') {
    <h2 class="text header header__2">{{ value() }}</h2>
  }
  @case ('h3') {
    <h3 class="text header header__3">{{ value() }}</h3>
  }
}
