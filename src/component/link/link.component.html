@if (externalLink()) {
  <a class="link" [href]="getUrl()" target="_blank">
    <text-component type="p" [value]="label()" [isLink]="true"></text-component>
  </a>
} @else {
  <a class="link" (click)="onClick()">
    <text-component type="p" [value]="label()" [isLink]="true"></text-component>
  </a>
}
