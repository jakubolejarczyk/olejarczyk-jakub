@switch (type()) {
  @case ('small') {
    <small class="text small">{{ value() }}</small>
  }
  @case ('p') {
    <p class="text p">{{ value() }}</p>
  }
  @case ('h1') {
    <h1 class="text h1">{{ value() }}</h1>
  }
  @case ('h2') {
    <h2 class="text h2">{{ value() }}</h2>
  }
  @case ('h3') {
    <h3 class="text h3">{{ value() }}</h3>
  }
}
