<section class="contact">
  <div class="contact__column">
    <text-component type="h2" color="inverse" [value]="contact().fullname"></text-component>
    <div class="contact__items">
      <text-component
        type="p"
        color="inverse"
        value="I write code that works today"
      ></text-component>
      <text-component type="p" color="inverse" value="and won't fail tomorrow."></text-component>
    </div>
  </div>
  <div class="contact__column">
    <text-component type="h3" color="inverse" value="Social media"></text-component>
    <div class="contact__items">
      @for (socialMedia of contact().socialMedias; track socialMedia.label) {
        <text-component type="p" [value]="socialMedia.label"></text-component>
      }
    </div>
  </div>
  <div class="contact__column">
    <text-component type="h3" color="inverse" value="Contact"></text-component>
    <div class="contact__items">
      <text-component type="p" [value]="contact().email"></text-component>
      <text-component type="p" [value]="contact().phone"></text-component>
      <text-component type="p" color="inverse" [value]="contact().location"></text-component>
    </div>
  </div>
</section>
