<section class="contact">
  <div class="contact__column">
    <text-component type="h2" [value]="contact().fullname"></text-component>
    <div class="contact__items">
      <text-component
        type="p"
        color="inverse"
        value="I write code that works today"
      ></text-component>
      <text-component type="p" color="inverse" value="and won't fail tomorrow."></text-component>
    </div>
  </div>
  <div class="contact__column">
    <text-component type="h3" value="Social media"></text-component>
    <div class="contact__items">
      @for (socialMedia of contact().socialMedias; track socialMedia.label) {
        <link-component
          [label]="socialMedia.label"
          [href]="socialMedia.url"
          type="page"
          palette="primary"
          [external]="true"
        ></link-component>
      }
    </div>
  </div>
  <div class="contact__column">
    <text-component type="h3" value="Contact"></text-component>
    <div class="contact__items">
      <link-component
        [label]="contact().email"
        [href]="contact().email"
        type="email"
        palette="primary"
        [external]="true"
      ></link-component>
      <link-component
        [label]="contact().phone"
        [href]="contact().phone"
        type="phone"
        palette="primary"
        [external]="true"
      ></link-component>
      <text-component type="p" color="inverse" [value]="contact().location"></text-component>
    </div>
  </div>
</section>
