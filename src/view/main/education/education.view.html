<div class="education">
  @for (education of educations(); track education) {
    <text-component type="p" [value]="education.year"></text-component>
    <text-component type="p" [value]="education.university"></text-component>
    <text-component type="p" [value]="education.major"></text-component>
    <text-component type="p" [value]="education.degree"></text-component>
  }
</div>
